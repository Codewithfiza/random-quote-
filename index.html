<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quote Generator</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="noise"></div>

  <div class="grain"></div>

  <header class="header">
    <span class="logo">&#10048; Quotia</span>
    <span class="tagline">words that move you</span>
  </header>

  <main class="main">

    <div class="card" id="quoteCard">

      <div class="card-deco top-left">&#8220;</div>
      <div class="card-deco bottom-right">&#8221;</div>

      <div class="quote-wrap">
        <p class="quote-text" id="quoteText">
          The best time to plant a tree was 20 years ago. The second best time is now.
        </p>
        <span class="quote-author" id="quoteAuthor">— Chinese Proverb</span>
      </div>

      <div class="card-footer">
        <div class="tag-row">
          <span class="tag" id="quoteTag">wisdom</span>
        </div>

        <div class="actions">
          <button class="btn-icon" id="copyBtn" title="Copy quote">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>

          <button class="btn-icon" id="twitterBtn" title="Share on Twitter">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </button>

          <button class="btn-new" id="newQuoteBtn">
            New Quote
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
          </button>
        </div>
      </div>

    </div>

    <!-- Progress dots -->
    <div class="progress-dots" id="progressDots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

  </main>

  <footer class="footer">
    <span>crafted with <span class="heart">♥</span> for curious minds</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
